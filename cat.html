<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 灵魂像素猫咪</title>
    <style>
        :root { 
            --bg: #fdf6e3; 
            --text: #5c4e43; 
            --accent: #a49382; 
            --panel: #ffffff;
            --h-color: #e67e22;
            --s-color: #f1c40f;
            --c-color: #3498db;
        }
        /* 全局适配手机触摸 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            background: #d6cfc5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: -apple-system, "SF Pro Text", "Helvetica Neue", sans-serif; 
            color: var(--text); 
            overflow: hidden; 
        }
        .app { 
            width: 100%; 
            max-width: 470px; 
            height: 550px; 
            background: var(--panel); 
            border-radius: 35px; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            box-shadow: 0 25px 60px rgba(0,0,0,0.2); 
            border: 4px solid white; 
            position: relative; 
        }
        .header { background: #fff; padding: 10px; text-align: center; font-weight: bold; font-size: 1rem; border-bottom: 2px solid #f2f0eb; }
        .display { flex: 1; background: var(--bg); display: flex; justify-content: center; align-items: center; position: relative; }
        #pet-svg { width: 175px; height: 175px; z-index: 1; transition: transform 0.2s ease; }
        
        .stats { padding: 8px 20px; background: #fff; border-bottom: 1px solid #f2f0eb; }
        .stat-row { display: flex; align-items: center; margin: 4px 0; }
        .label { width: 45px; font-size: 10px; font-weight: bold; color: var(--accent); }
        .p-bg { flex: 1; height: 10px; background: #eee; border-radius: 5px; border: 1px solid #e0ddd8; overflow: hidden; }
        .p-fill { height: 100%; transition: width 1s ease; }

        .msg-box { height: 75px; padding: 10px 25px; font-size: 13px; text-align: center; font-style: italic; background: #fff; display: flex; align-items: center; justify-content: center; color: #887a6d; line-height: 1.4; border-top: 1px solid #f2f0eb; overflow-y: auto; }

        /* 初始隐藏动作按钮 */
        .actions { 
            display: none; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 8px; 
            padding: 10px; 
            background: #fcfaf7; 
        }
        .btn { padding: 10px; border: 2px solid var(--accent); border-radius: 14px; background: white; color: var(--text); font-weight: bold; cursor: pointer; font-size: 12px; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 4px; }
        .btn:active { transform: scale(0.96); background: var(--accent); color: white; }
        .btn-init { border-color: #cc9999; color: #a36666; }

        /* 全屏子菜单覆盖层 */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.98); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; padding: 20px; }
        .overlay-title { font-size: 1.1rem; font-weight: bold; margin-bottom: 12px; color: var(--accent); }
        
        /* 领养界面美化 */
        #adopt-view { display: flex; z-index: 110; }
        .preview-box { width: 110px; height: 110px; background: var(--bg); border-radius: 20px; border: 2px solid var(--accent); display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }
        .input-group { width: 100%; max-width: 260px; display: flex; flex-direction: column; gap: 8px; }
        select, input { padding: 12px; width: 100%; border-radius: 12px; border: 2px solid #eee; font-size: 14px; color: var(--text); background: white; }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 320px; }
    </style>
</head>
<body>

<div class="app">
    <div class="header" id="ui-title">🐾 像素猫咪后院</div>
    
    <div class="display">
        <div id="pet-svg"></div>
        
        <!-- 1. 领养界面 -->
        <div id="adopt-view" class="overlay">
            <div class="overlay-title">领养你的猫咪</div>
            <div class="preview-box" id="preview-container"></div>
            <div class="input-group">
                <select id="breed-sel" onchange="updateAdoptPreview()"></select>
                <input type="text" id="name-in" placeholder="起个好听的名字..." maxlength="8">
                <button class="btn" style="background: var(--accent); color: white;" onclick="doAdopt()">确认领养</button>
            </div>
        </div>

        <!-- 2. 喂食覆盖层 -->
        <div id="menu-feed" class="overlay">
            <div class="overlay-title">选择美味</div>
            <div class="menu-grid">
                <button class="btn" onclick="perform('feed','猫粮',20,0,0)">🥫 普通猫粮</button>
                <button class="btn" onclick="perform('feed','罐头',25,10,-5)">🍣 吞拿鱼罐头</button>
                <button class="btn" onclick="perform('feed','零食',5,15,0)">🐟 香脆鱼干</button>
                <button class="btn" onclick="perform('feed','猫饭',30,20,0)">🍱 爱心猫饭</button>
                <button class="btn" style="grid-column: span 2; border-color: #ddd;" onclick="closeOverlay()">返回</button>
            </div>
        </div>

        <!-- 3. 玩耍覆盖层 -->
        <div id="menu-play" class="overlay">
            <div class="overlay-title">开始玩耍</div>
            <div class="menu-grid">
                <button class="btn" onclick="perform('play','逗猫棒',-10,20,-5)">🦋 逗猫棒</button>
                <button class="btn" onclick="perform('play','玩球',-5,15,0)">🧶 踢踢球</button>
                <button class="btn" onclick="perform('play','互动',0,15,0)">🫂 亲亲抱抱</button>
                <button class="btn" onclick="perform('play','纸箱',0,25,0)">📦 钻纸箱</button>
                <button class="btn" onclick="explore()" style="grid-column: span 2; background: #fafafa;">🌳 户外探索 (有惊喜)</button>
                <button class="btn" style="grid-column: span 2; border-color: #ddd;" onclick="closeOverlay()">返回</button>
            </div>
        </div>
    </div>

    <!-- 状态 -->
    <div class="stats">
        <div class="stat-row"><span class="label">饱腹</span><div class="p-bg"><div id="h-bar" class="p-fill" style="background:var(--h-color); width:80%"></div></div></div>
        <div class="stat-row"><span class="label">心情</span><div class="p-bg"><div id="s-bar" class="p-fill" style="background:var(--s-color); width:80%"></div></div></div>
        <div class="stat-row"><span class="label">清洁</span><div class="p-bg"><div id="c-bar" class="p-fill" style="background:var(--c-color); width:90%"></div></div></div>
    </div>

    <div class="msg-box" id="msg">欢迎来到你的猫咪世界。</div>

    <!-- 主控面板 (领养后显示) -->
    <div class="actions" id="main-actions">
        <button class="btn" onclick="openOverlay('feed')">🥘 喂食</button>
        <button class="btn" onclick="openOverlay('play')">🎡 玩耍</button>
        <button class="btn" onclick="aiChat()">💬 对话</button>
        <button class="btn" onclick="perform('bath','洗澡',0,-15,50)">🚿 洗澡</button>
        <button class="btn btn-init" onclick="initGame()">⚙️ 重置</button>
    </div>
</div>

<script>
    const breeds = [
        { n: "中华田园猫", c: "#d4c0ab", s: "#8c7360", b: "#fdfcfb" },
        { n: "英国短毛猫", c: "#91a3b0", s: "#708090", b: "#91a3b0" },
        { n: "布偶猫", c: "#fdfcfb", s: "#b0c4de", b: "#ffffff" },
        { n: "美国短毛猫", c: "#d3d3d3", s: "#696969", b: "#f5f5f5" },
        { n: "暹罗猫", c: "#f5f5dc", s: "#3d2b1f", b: "#e6dacb" },
        { n: "波斯猫", c: "#ffffff", s: "#e0e0e0", b: "#ffffff" },
        { n: "苏格兰折耳猫", c: "#e3c9c9", s: "#c19a9a", b: "#fdfcfb", fold: true },
        { n: "缅因猫", c: "#8b4513", s: "#3d2b1f", b: "#d2b48c" },
        { n: "斯芬克斯猫", c: "#f8d7da", s: "#f1b0b7", b: "#f8d7da" },
        { n: "孟加拉豹猫", c: "#cd853f", s: "#3d2b1f", b: "#f5deb3" }
    ];
    const personalities = ["贪吃", "活泼", "安静", "社交达人", "好奇", "暴躁", "独行侠", "胆小敏感", "粘人", "拆家能手"];
    let cat = { name: "", bIdx: 0, trait: "", h: 80, s: 80, c: 90, gifts: 0, count: 0, lastSeen: Date.now() };

    function getSVG(idx, size=180) {
        const i = breeds[idx]; const f = i.fold||false;
        return `<svg viewBox="0 0 48 48" width="${size}" height="${size}" shape-rendering="crispEdges">
            <rect x="14" y="${f?14:11}" width="4" height="1" fill="#333"/><rect x="13" y="${f?15:12}" width="1" height="4" fill="#333"/><rect x="18" y="${f?15:12}" width="1" height="3" fill="#333"/><rect x="30" y="${f?14:11}" width="4" height="1" fill="#333"/><rect x="34" y="${f?15:12}" width="1" height="4" fill="#333"/><rect x="29" y="${f?15:12}" width="1" height="3" fill="#333"/>
            <rect x="14" y="${f?15:12}" width="4" height="3" fill="${i.c}"/><rect x="15" y="${f?16:13}" width="2" height="2" fill="#f8b8b8"/><rect x="30" y="${f?15:12}" width="4" height="3" fill="${i.c}"/><rect x="31" y="${f?16:13}" width="2" height="2" fill="#f8b8b8"/>
            <rect x="18" y="15" width="12" height="1" fill="#333"/><rect x="12" y="16" width="1" height="11" fill="#333"/><rect x="35" y="16" width="1" height="11" fill="#333"/><rect x="13" y="27" width="22" height="1" fill="#333"/>
            <rect x="14" y="28" width="1" height="9" fill="#333"/><rect x="33" y="28" width="1" height="9" fill="#333"/><rect x="15" y="37" width="18" height="1" fill="#333"/>
            <rect x="35" y="30" width="4" height="1" fill="#333"/><rect x="39" y="31" width="1" height="5" fill="#333"/><rect x="34" y="36" width="5" height="1" fill="#333"/>
            <rect x="13" y="16" width="22" height="11" fill="${i.c}"/><rect x="15" y="28" width="18" height="9" fill="${i.c}"/><rect x="35" y="31" width="4" height="5" fill="${i.c}"/>
            <rect x="21" y="16" width="6" height="1" fill="${i.s}"/><rect x="23" y="17" width="2" height="2" fill="${i.s}"/><rect x="13" y="21" width="3" height="1" fill="${i.s}"/><rect x="32" y="21" width="3" height="1" fill="${i.s}"/><rect x="36" y="31" width="1" height="5" fill="${i.s}"/><rect x="38" y="31" width="1" height="5" fill="${i.s}"/>
            <rect x="19" y="22" width="2" height="2" fill="#333"/><rect x="27" y="22" width="2" height="2" fill="#333"/><rect x="24" y="25" width="1" height="1" fill="#f8b8b8"/><rect x="20" y="27" width="8" height="10" fill="${i.b}"/><rect x="21" y="35" width="1" height="2" fill="#333"/><rect x="26" y="35" width="1" height="2" fill="#333"/>
        </svg>`;
    }

    const reactions = {
        feed: {
            "猫粮": { "贪吃": ["【狂吃】如果是为了吃，我可以一直吃下去喵！","嚼嚼...虽然简单但很安心喵。"], "default": ["谢谢主人的投喂喵。","肚子填饱啦喵。"] },
            "罐头": { "暴躁": ["别以为一个罐头就能收买我...唔，真香喵。","勉强接受你的讨好喵。"], "粘人": ["哇！主人亲手喂的罐头最好吃了喵！","想一边吃一边蹭你喵。"], "default": ["【狂喜】这就是罐头开启的幸福声音喵！","湿粮最棒了喵！"] },
            "零食": { "拆家能手": ["吃了这口鱼干，有力气拆沙发了喵！","心情好极了喵。"], "default": ["【奖励】最喜欢小鱼干奖励了喵！","再来一颗喵？"] },
            "猫饭": { "安静": ["这种被温柔对待的感觉，真好喵。","主人的手艺是全世界第一喵。"], "default": ["【享受】盘子被我舔得亮晶晶喵！","简直是艺术品喵！"] }
        },
        play: {
            "逗猫棒": { "活泼": ["【残影】看我的无影爪！抓到了喵！","再跳高一点我也抓得到喵！"], "default": ["激发了我的捕猎本能喵！","我跳喵！"] },
            "玩球": { "好奇": ["这个球球里是不是藏着什么秘密喵？","我要把它抓烂喵！"], "default": ["球球滚来滚去喵！","我是踢球大师喵！"] },
            "互动": { "粘人": ["呼噜噜...请永远不要停手喵。","主人手心好暖喵。"], "default": ["蹭蹭你的掌心喵。","这种亲昵感真好喵。"] },
            "纸箱": { "拆家能手": ["这是我的新堡垒！看我咬烂它喵！","纸箱万岁喵！"], "default": ["【安全感】钻进纸箱就不想出来了喵。","藏猫猫喵！"] }
        },
        bath: { "胆小敏感": ["【极度惊恐】救命喵！水是魔鬼！","求求你放我出去喵！"], "default": ["毛全塌了，我现在好丑喵。","我要疯狂甩水溅你一身喵！"] }
    };

    function save() { cat.lastSeen = Date.now(); localStorage.setItem('cat_perfect_v9', JSON.stringify(cat)); }
    function load() {
        const d = localStorage.getItem('cat_perfect_v9');
        if (d) {
            cat = JSON.parse(d); document.getElementById('adopt-view').style.display = 'none';
            document.getElementById('main-actions').style.display = 'grid'; 
            document.getElementById('pet-svg').innerHTML = getSVG(cat.bIdx);
            const awayMin = (Date.now() - cat.lastSeen) / 60000;
            cat.h = Math.max(0, cat.h - Math.floor(awayMin/12)); cat.s = Math.max(0, cat.s - Math.floor(awayMin/18));
            let m = awayMin > 60 ? "你终于回来了，我好想你喵。" : "欢迎回来，我的主人喵。";
            if(awayMin > 60) {
                const ms = { "粘人":"主人你去哪了呜呜，我一直守在门口等你的喵！", "暴躁":"哼，还知道回来？我还以为你把我这个可怜的小猫忘了喵！", "default":"你不在的时候，家里好安静。我很想念你喵。" };
                m = ms[cat.trait] || ms.default;
            }
            updateUI(m);
        } else {
            const sel = document.getElementById('breed-sel');
            breeds.forEach((b,i)=>sel.add(new Option(b.n, i))); updateAdoptPreview();
        }
    }

    function initGame() { if(confirm("确定要重置吗？你的猫咪和所有记录都会消失喵！")) { localStorage.removeItem('cat_perfect_v9'); location.reload(); } }

    function aiChat() {
        const input = prompt(`想对 ${cat.name} 说点什么？`); if(!input) return;
        const text = input.toLowerCase(); let rList = [];
        const chatData = {
            warm: { "暴躁": ["哼，啰嗦。","别以为夸两句我就不拆沙发喵。"], "粘人": ["永远在一起喵！","主人最好了喵！"], "default": ["咕噜噜...喵。","害羞蹭蹭你喵。"] },
            sad: ["我会一直陪着你的。","摸摸头，不难过喵。","喵呜~ 给你我的毛绒抱抱。"],
            bye: ["早点回来喵！","记得带罐头喵！","我会一直等你的。"],
            idle: { "贪吃": ["开饭了吗喵？","想吃鱼干喵。"], "好奇": ["你在做什么喵？能带上我吗喵？"], "default": ["今天适合睡觉喵。","喵呜~ 给主人唱首歌。"] }
        };
        if(/(爱|喜欢|乖|可爱|棒|亲|想|漂亮|好)/.test(text)) rList = chatData.warm[cat.trait] || chatData.warm.default;
        else if(/(累|难过|伤心|哭|委屈|烦|痛)/.test(text)) rList = chatData.sad;
        else if(/(再见|拜拜|走|出门|离)/.test(text)) rList = chatData.bye;
        else rList = chatData.idle[cat.trait] || chatData.idle.default;
        updateUI(`【对话】${rList[Math.floor(Math.random()*rList.length)]}`); save();
    }

    function perform(act, sub, h, s, c) {
        let tB = (cat.trait==='贪吃'&&act==='feed')||(cat.trait==='活泼'&&act==='play')?15:0;
        cat.h=Math.min(100, Math.max(0, cat.h+h)); cat.s=Math.min(100, Math.max(0, cat.s+s+tB)); cat.c=Math.min(100, Math.max(0, cat.c+c));
        if(act==='feed') cat.count++;
        let pool = (reactions[act] && reactions[act][sub]) ? (reactions[act][sub][cat.trait] || reactions[act][sub].default) : ["好开心喵！"];
        updateUI(pool[Math.floor(Math.random()*pool.length)]); save(); closeOverlay();
        const pet = document.getElementById('pet-svg'); pet.style.transform = 'scale(1.1)'; setTimeout(()=>pet.style.transform = 'scale(1)', 200);
    }

    function explore() {
        if(cat.trait==='胆小敏感'&&Math.random()<0.4) return updateUI("外面声音好大，它吓得躲进了你怀里喵。");
        perform('play','探险',-20,30,-20);
        if(Math.random()<0.5) {
            const g = ["漂亮的落叶","羽毛","瓶盖","石子","鱼干"][Math.floor(Math.random()*5)];
            cat.gifts++; setTimeout(()=>updateUI(`【惊喜】${cat.name} 叼回了[${g}]送给你喵！`), 2500);
        }
    }

    function openOverlay(id) { document.getElementById('menu-'+id).style.display = 'flex'; }
    function closeOverlay() { document.getElementById('menu-feed').style.display='none'; document.getElementById('menu-play').style.display='none'; }
    function updateAdoptPreview() { document.getElementById('preview-container').innerHTML = getSVG(document.getElementById('breed-sel').value, 95); }
    function doAdopt() {
        const n = document.getElementById('name-in').value.trim(); if(!n) return alert("请起名字喵！");
        cat.name = n; cat.bIdx = document.getElementById('breed-sel').value;
        cat.trait = personalities[Math.floor(Math.random()*personalities.length)];
        document.getElementById('adopt-view').style.display = 'none';
        document.getElementById('main-actions').style.display = 'grid'; 
        document.getElementById('pet-svg').innerHTML = getSVG(cat.bIdx);
        updateUI(`【初见】${cat.name} 正温顺地看着你，一段奇妙的关系开始了。`); save();
    }
    function updateUI(m) {
        document.getElementById('h-bar').style.width = cat.h+'%'; document.getElementById('s-bar').style.width = cat.s+'%'; document.getElementById('c-bar').style.width = cat.c+'%';
        if(m) document.getElementById('msg').innerText = m;
        let title = "幼猫"; if(cat.h>90 && cat.count>12) title = "美食家"; else if(cat.gifts>3) title = "探险家";
        document.getElementById('ui-title').innerText = cat.name ? `🐾 ${cat.name} [${title}]` : "领养中心";
    }
    window.onload = load; setInterval(save, 5000);
</script>
</body>
</html>
